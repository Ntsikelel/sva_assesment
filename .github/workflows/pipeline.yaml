name: Senior Verification Assessment

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    
permissions:
  id-token: write
  contents: read  
  
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767398146991:role/sva-gha-role
          aws-region: eu-west-2
      - uses: hashicorp/setup-terraform@v3
      - run: terraform  init
      - run: terraform  validate
      - run: terraform  fmt -check
      - name: Terraform Plan
        if: github.event_name == 'pull_request'
        run: terraform  plan
        
      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform  apply -auto-approve -var=sva_secret=${{ github.sha }}

  ansible:
    needs: terraform
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::767398146991:role/sva-gha-role
          aws-region: eu-west-2
      - name: Install Ansible
        run: pip install ansible
      - name: Run collection Install 
        run: ansible-galaxy collection install amazon.aws:==5.5.0 --force
      - name: Run Playbook
        run: ansible-playbook -i ansible/inventory.aws_ec2.yml ansible/hostconfig.yml
