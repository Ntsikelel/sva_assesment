---
- hosts: all
  become: true
  tasks:
    - yum: { name: "*", state: latest }
    - yum: { name: [nginx, awscli, amazon-cloudwatch-agent], state: present }
    # - file: { path: /var/app, state: directory }
    # - shell: aws ssm get-parameter --name /sva/APP_SECRET --with-decryption --query 'Parameter.Value' --output text > /var/app/secret.txt
    #   args: { creates: /var/app/secret.txt }
    # - file: { path: /var/app/secret.txt, mode: '0600' }
    - copy: { content: '{"service":"sva_ntsikelelo_metseeme","status":"ok","commit":"unknown","region":"eu-west-2"}', dest: /usr/share/nginx/html/health.json }
    - copy:
        content: |
          server { listen 80 default_server; root /usr/share/nginx/html; location /health { default_type application/json; } }
        dest: /etc/nginx/conf.d/default.conf
    - copy:
        content: |
          { "logs": { "logs_collected": { "files": { "collect_list": [ { "file_path": "/var/log/nginx/access.log", "log_group_name": "/aws/sva/nginx/access", "log_stream_name": "{{ ansible_hostname }}" }, { "file_path": "/var/log/nginx/error.log", "log_group_name": "/aws/sva/nginx/error", "log_stream_name": "{{ ansible_hostname }}" } ] } } } }
        dest: /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json
    - systemd: { name: nginx, state: restarted, enabled: true }
    - systemd: { name: amazon-cloudwatch-agent, state: restarted, enabled: true }
    - lineinfile: { path: /etc/ssh/sshd_config, regexp: '^PermitRootLogin', line: 'PermitRootLogin prohibit-password' }
      notify: restart ssh
  handlers:
    - name: restart ssh
      systemd: { name: sshd, state: restarted }